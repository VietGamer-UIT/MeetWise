# ============================================================
# .github/workflows/main.yml — CI/CD Pipeline MeetWise
# Tác giả: Đoàn Hoàng Việt (Việt Gamer)
#
# Kích hoạt khi:
#   - Push lên branch main hoặc develop
#   - Tạo Pull Request vào main hoặc develop
#
# Các jobs:
#   1. test-backend  → Chạy pytest cho FastAPI
#   2. test-frontend → Lint + Build kiểm tra Next.js
#   3. docker-build  → Build Docker images (chỉ khi push main)
# ============================================================

name: MeetWise CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Hủy job cũ khi có push mới vào cùng branch (tiết kiệm tài nguyên)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ─── Job 1: Kiểm tra Backend (Python + FastAPI) ────────────
jobs:
  test-backend:
    name: 🐍 Backend — Pytest
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/api   # Tất cả lệnh chạy trong apps/api/

    steps:
      - name: ⬇️ Lấy mã nguồn
        uses: actions/checkout@v4

      - name: 🐍 Cài Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip                  # Cache pip để build nhanh hơn
          cache-dependency-path: apps/api/requirements.txt

      - name: 📦 Cài dependencies Python
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🧪 Chạy toàn bộ test suite (pytest)
        run: |
          python -m pytest tests/ \
            --tb=short \
            --maxfail=5 \
            -q \
            --no-header
        env:
          # Zero-setup mode: không cần API key khi test
          USE_LLM: "false"
          USE_FIREBASE: "false"
          USE_GOOGLE_SERVICES: "false"
          APP_ENV: "test"
          LOG_LEVEL: "WARNING"

      - name: 📊 Báo cáo kết quả (nếu thất bại)
        if: failure()
        run: |
          echo "❌ Một số test thất bại. Xem log bên trên để biết chi tiết."

  # ─── Job 2: Kiểm tra Frontend (Node.js + Next.js) ────────
  test-frontend:
    name: ⚡ Frontend — Lint & Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/web   # Tất cả lệnh chạy trong apps/web/

    steps:
      - name: ⬇️ Lấy mã nguồn
        uses: actions/checkout@v4

      - name: 🟢 Cài Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: 📦 Cài dependencies Node.js
        run: npm ci --frozen-lockfile

      - name: 🔍 Kiểm tra lint (ESLint)
        run: npm run lint
        env:
          # Biến môi trường placeholder để lint không bị lỗi missing env
          NEXT_PUBLIC_API_URL: "http://localhost:8000"
          NEXT_PUBLIC_SUPABASE_URL: "https://placeholder.supabase.co"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "placeholder_anon_key"

      - name: 🏗️ Build production bundle (kiểm tra lỗi TypeScript + compile)
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: "http://localhost:8000"
          NEXT_PUBLIC_SUPABASE_URL: "https://placeholder.supabase.co"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "placeholder_anon_key"
          NEXT_TELEMETRY_DISABLED: "1"

      - name: ✅ Build thành công
        if: success()
        run: echo "✅ Frontend build thành công — tất cả pages đã được kiểm tra."

  # ─── Job 3: Build Docker Images (chỉ khi push lên main) ──
  docker-build:
    name: 🐳 Docker — Build & Verify
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]   # Chỉ chạy khi cả 2 jobs trên đều pass
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: ⬇️ Lấy mã nguồn
        uses: actions/checkout@v4

      - name: 🐳 Setup Docker Buildx (multi-platform support)
        uses: docker/setup-buildx-action@v3

      - name: 🔨 Build Docker image — Backend API
        uses: docker/build-push-action@v5
        with:
          context: apps/api
          file: apps/api/Dockerfile
          push: false                # Chỉ build, chưa push lên registry
          tags: meetwise-api:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 🔨 Build Docker image — Frontend Web
        uses: docker/build-push-action@v5
        with:
          context: apps/web
          file: apps/web/Dockerfile
          push: false
          tags: meetwise-web:ci-${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_API_URL=http://localhost:8000
            NEXT_PUBLIC_SUPABASE_URL=https://placeholder.supabase.co
            NEXT_PUBLIC_SUPABASE_ANON_KEY=placeholder
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 🎉 Hoàn thành CI/CD
        run: |
          echo "🚀 Tất cả checks đã pass!"
          echo "   ✅ Backend tests:    PASSED"
          echo "   ✅ Frontend build:   PASSED"
          echo "   ✅ Docker images:    BUILT"
          echo ""
          echo "📦 Commit: ${{ github.sha }}"
          echo "🌿 Branch: ${{ github.ref_name }}"
